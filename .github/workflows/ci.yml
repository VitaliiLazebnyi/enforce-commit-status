name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Using 24 as it matches action.yml runs.using

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify Clean Repository
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Working directory is dirty. Please run 'npm run build' locally and commit the changes."
            git status
            exit 1
          fi
